  @if (loading()) {
    <div class="flex justify-center py-8">
      <mat-progress-spinner mode="indeterminate" />
    </div>
  } @else {
    <table mat-table [dataSource]="categoriesData()">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let element">{{ element.description }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="handleEditCategory(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button (click)="handleDeleteCategory(element.id)" mat-icon-button>
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['id', 'name', 'description', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['id', 'name', 'description', 'actions'];"></tr>
    </table>
    <mat-paginator #paginator [pageSizeOptions]="pageSizeOptions" [pageSize]="pageSize()" [pageIndex]="currentPage()" [length]="totalElements()" (page)="handlePageEvent($event)" />
  }
