  @if (loading()) {
    <div class="flex justify-center py-8">
      <mat-progress-spinner mode="indeterminate" />
    </div>
  } @else {
    <div class="table-wrapper">
      <table mat-table [dataSource]="categoriesData()" class="categories-table">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let element" class="desc-cell">{{ element.description }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let element" class="actions-cell">
            @if (canManage()) {
            <button mat-icon-button (click)="handleEditCategory(element)">
              <mat-icon>edit</mat-icon>
            </button>
            }
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="['id', 'name', 'description', 'actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['id', 'name', 'description', 'actions'];"></tr>
      </table>
    </div>
    <mat-paginator #paginator [pageSizeOptions]="pageSizeOptions" [pageSize]="pageSize()" [pageIndex]="currentPage()" [length]="totalElements()" (page)="handlePageEvent($event)" />
  }
