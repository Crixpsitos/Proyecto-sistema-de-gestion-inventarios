<section class="form-shell">
  <header class="form-header">
    <h1>Editar empleado</h1>
    <p>Actualiza datos de perfil y rol.</p>
  </header>

  <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Apellido</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo documento</mat-label>
      <mat-select formControlName="documentType">
        <mat-option value="CC">CC</mat-option>
        <mat-option value="CE">CE</mat-option>
        <mat-option value="PASSPORT">PASSPORT</mat-option>
        <mat-option value="NIT">NIT</mat-option>
        <mat-option value="RUT">RUT</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Número documento</mat-label>
      <input matInput formControlName="documentNumber" />
    </mat-form-field>

    <div class="actions full-width">
      <button mat-stroked-button type="button" (click)="back()">Volver</button>
      <button mat-flat-button color="primary" type="submit">Guardar perfil</button>
    </div>
  </form>

  <form [formGroup]="permissionsForm" (ngSubmit)="savePermissions()" class="form-grid second-block">
    <mat-form-field appearance="outline">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="role">
        <mat-option value="ADMIN">Administrador</mat-option>
        <mat-option value="MANAGER">Encargado</mat-option>
        <mat-option value="EMPLOYEE">Empleado</mat-option>
      </mat-select>
    </mat-form-field>

    <div></div>

    <div class="actions full-width">
      <button mat-flat-button color="primary" type="submit">Guardar rol</button>
    </div>
  </form>
</section>
