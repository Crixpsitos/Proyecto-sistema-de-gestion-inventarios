<section class="form-shell">
  <header class="form-header">
    <h1>Nuevo empleado</h1>
    <p>Crear cuenta y asignar rol del sistema.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Apellido</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Contraseña</mat-label>
      <input matInput type="password" formControlName="password" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo documento</mat-label>
      <mat-select formControlName="documentType">
        <mat-option value="CC">CC</mat-option>
        <mat-option value="CE">CE</mat-option>
        <mat-option value="PASSPORT">PASSPORT</mat-option>
        <mat-option value="NIT">NIT</mat-option>
        <mat-option value="RUT">RUT</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Número documento</mat-label>
      <input matInput formControlName="documentNumber" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="role">
        <mat-option value="ADMIN">Administrador</mat-option>
        <mat-option value="MANAGER">Encargado</mat-option>
        <mat-option value="EMPLOYEE">Empleado</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="actions full-width">
      <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
      <button mat-flat-button color="primary" type="submit">Guardar</button>
    </div>
  </form>
</section>
