<div class="table-wrap">
  <table mat-table [dataSource]="employees()" class="employee-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Empleado</th>
      <td mat-cell *matCellDef="let e">{{ e.name }} {{ e.lastName }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Correo</th>
      <td mat-cell *matCellDef="let e">{{ e.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Rol</th>
      <td mat-cell *matCellDef="let e">{{ roleLabel(e.role) }}</td>
    </ng-container>

    <ng-container matColumnDef="enabled">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let e">
        @if (e.enabled) {
          <span class="badge badge-on">Activo</span>
        } @else {
          <span class="badge badge-off">Inactivo</span>
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let e">
        @if (canUpdate()) {
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="editEvent.emit(e.id)">
            <mat-icon>edit</mat-icon>
          </button>

          @if (e.enabled) {
            <button mat-icon-button color="warn" matTooltip="Inactivar" (click)="deactivateEvent.emit(e.id)">
              <mat-icon>block</mat-icon>
            </button>
          } @else {
            <button mat-icon-button color="accent" matTooltip="Activar" (click)="activateEvent.emit(e.id)">
              <mat-icon>check_circle</mat-icon>
            </button>
          }
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
