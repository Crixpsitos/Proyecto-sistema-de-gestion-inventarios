<div
  class="flex flex-col sm:flex-row items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6"
>
  <!-- Barra de Búsqueda -->
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full sm:flex-1">
    <mat-icon matPrefix class="text-gray-400">search</mat-icon>
    <mat-label>Buscar locación...</mat-label>
    <input [value]="searchTerm()" matInput placeholder="Nombre o código de locación" [formControl]="search" />
  </mat-form-field>

  <!-- Selector de Tipo -->
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full sm:w-64">
    <mat-label>Tipo de locación</mat-label>
    <mat-select [value]="selectedType()" (selectionChange)="onTypeChange($event.value)" >
      <mat-option [value]="'all'">Todos los tipos</mat-option>
      @for (type of types(); track type.value) {
        <mat-option [value]="type.value">{{ type.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <div class="flex items-stretch gap-3 w-full sm:w-auto h-[56px]">
    <!-- Botón de Filtro Activos -->
    <button
      mat-stroked-button
      type="button"
      (click)="toggleFilterActive()"
      class="flex-1 sm:flex-none !h-full !rounded-xl flex items-center justify-center gap-2 transition-all !border-2 !px-6"
      [class.!bg-indigo-50]="onlyActive()"
      [class.!text-indigo-700]="onlyActive()"
      [class.!border-indigo-300]="onlyActive()"
    >
      <mat-icon class="!m-0 text-xl">{{ onlyActive() ? 'toggle_on' : 'toggle_off' }}</mat-icon>
      <span class="font-bold uppercase text-xs tracking-wider">Solo activos</span>
    </button>

    <!-- Botón Nueva Locación -->
    @if (canManage()) {
    <button
      mat-flat-button
      color="primary"
      (click)="addLocation.emit()"
      class="flex-1 sm:flex-none !h-full !rounded-xl flex items-center justify-center gap-2 shadow-sm hover:shadow-md transition-all !px-6"
    >
      <mat-icon class="!m-0 text-xl">add_location_alt</mat-icon>
      <span class="font-bold uppercase text-xs tracking-wider">Nueva Locación</span>
    </button>
    }
  </div>
</div>
