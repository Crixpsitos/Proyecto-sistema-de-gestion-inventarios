spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_inventarios_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Security configuration
security.jwt.secret=${JWT_SECRET:local-dev-jwt-secret-change-me-2026}
security.jwt.token.expire-length=3600
security.jwt.token.expire-type=MILLISECONDS
security.jwt.refresh.expire-length=604800

# Logging configuration
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB